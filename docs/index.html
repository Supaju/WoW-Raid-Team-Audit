<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Raid Readiness — Weekly Snapshots</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  html, body {
    background: #15181d;
    color: #e4e6eb;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    margin: 0; padding: 0;
  }
  .wrap {
    max-width: 520px;
    margin: 8vh auto 0 auto;
    padding: 32px;
    background: #1c2027;
    border: 1px solid #2e343e;
    border-radius: 10px;
  }
  h1 { margin: 0 0 4px 0; font-size: 20px; }
  .subtitle { color: #8a93a3; font-size: 13px; margin-bottom: 20px; }
  label { display: block; font-size: 12px; color: #8a93a3; margin-bottom: 6px; }
  select {
    width: 100%;
    padding: 10px 12px;
    background: #15181d;
    color: #e4e6eb;
    border: 1px solid #2e343e;
    border-radius: 6px;
    font-size: 14px;
  }
  .open-btn {
    display: inline-block;
    margin-top: 14px;
    padding: 10px 16px;
    background: #79a9ff;
    color: #0c1320;
    text-decoration: none;
    font-weight: 600;
    border-radius: 6px;
  }
  .open-btn:hover { background: #a0c2ff; }
  ul.weeks { list-style: none; padding: 0; margin: 20px 0 0 0; }
  ul.weeks li { padding: 6px 0; border-top: 1px solid #2e343e; font-size: 13px; }
  ul.weeks a { color: #79a9ff; text-decoration: none; }
  ul.weeks a:hover { text-decoration: underline; }
  .empty { color: #8a93a3; font-size: 13px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Raid Readiness</h1>
  <div class="subtitle">Weekly snapshots</div>

    <label for="week-select">Select a week</label>
    <select id="week-select">
        <option value="2026-W18/dashboard.html" selected>
          Raid Week 7 · Apr 28–May 4 (latest)        </option>
        <option value="2026-W17/dashboard.html" >
          Raid Week 6 · Apr 21–27        </option>
        <option value="2026-W16/dashboard.html" >
          Raid Week 5 · Apr 14–20        </option>
    </select>
    <a id="open-btn" class="open-btn" href="2026-W18/dashboard.html">Open dashboard →</a>

    <ul class="weeks">
        <li><a href="2026-W18/dashboard.html">Raid Week 7 · Apr 28–May 4</a></li>
        <li><a href="2026-W17/dashboard.html">Raid Week 6 · Apr 21–27</a></li>
        <li><a href="2026-W16/dashboard.html">Raid Week 5 · Apr 14–20</a></li>
    </ul>
</div>
<script>
  var sel = document.getElementById('week-select');
  var btn = document.getElementById('open-btn');
  if (sel && btn) {
    sel.addEventListener('change', function() {
      btn.setAttribute('href', sel.value);
    });
  }
</script>
</body>
</html>
