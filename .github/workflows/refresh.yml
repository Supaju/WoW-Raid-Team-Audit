  name: Refresh dashboard

  on:
    workflow_dispatch:
    schedule:
      - cron: '0 */2 * * *'

  permissions:
    contents: write

  concurrency:
    group: refresh
    cancel-in-progress: false

  jobs:
    refresh:
      runs-on: ubuntu-latest
      timeout-minutes: 10
      steps:
        - uses: actions/checkout@v4

        - uses: actions/setup-python@v5
          with:
            python-version: '3.12'
            cache: 'pip'
            cache-dependency-path: pyproject.toml

        - name: Install package
          run: pip install -e .

        - name: Generate dashboard
          env:
            WOWAUDIT_API_KEY: ${{ secrets.WOWAUDIT_API_KEY }}
            BLIZZARD_CLIENT_ID: ${{ secrets.BLIZZARD_CLIENT_ID }}
            BLIZZARD_CLIENT_SECRET: ${{ secrets.BLIZZARD_CLIENT_SECRET }}
          run: wowaudit-check --output docs

        - name: Commit snapshot if changed
          run: |
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add docs/
            if git diff --staged --quiet; then
              echo "No changes to commit."
            else
              STAMP=$(date -u +'%Y-%m-%d %H:%MZ')
              git commit -m "Refresh dashboard: $STAMP"
              git push
            fi
